<nav class="nav-lateral">
  <div class="logo" id="logo-lateral">SIDGI <span>BONOS</span></div>
  <button class="nav-item" data-nav="inicio" onclick="setVista('inicio')"><span data-icon="home"></span>Inicio</button>
  <button class="nav-item" data-nav="agenda" onclick="setVista('agenda')"><span data-icon="calendario"></span>Agenda</button>
  <button class="nav-item" data-nav="clientes" onclick="setVista('clientes')"><span data-icon="users"></span>Clientes</button>
  <button class="nav-item" data-nav="facturacion" onclick="setVista('facturacion')"><span data-icon="euro"></span>Facturación</button>
  <button class="nav-item" data-nav="ajustes" onclick="setVista('ajustes')"><span data-icon="settings"></span>Ajustes</button>
</nav>

<main class="app-main">
  <div id="vista-inicio"></div>
  <div id="vista-agenda" class="oculto"></div>
  <div id="vista-clientes" class="oculto"></div>
  <div id="vista-ficha" class="oculto"></div>
  <div id="vista-facturacion" class="oculto"></div>
  <div id="vista-ajustes" class="oculto"></div>
</main>

<!-- Navegación móvil -->
<nav class="nav-inferior">
  <button class="nav-item" data-nav="inicio" onclick="setVista('inicio')"><span data-icon="home"></span>Inicio</button>
  <button class="nav-item" data-nav="agenda" onclick="setVista('agenda')"><span data-icon="calendario"></span>Agenda</button>
  <button class="nav-item" data-nav="clientes" onclick="setVista('clientes')"><span data-icon="users"></span>Clientes</button>
  <button class="nav-item" data-nav="facturacion" onclick="setVista('facturacion')"><span data-icon="euro"></span>Facturación</button>
  <button class="nav-item" data-nav="ajustes" onclick="setVista('ajustes')"><span data-icon="settings"></span>Ajustes</button>
</nav>

<div class="modal-fondo" id="modal-fondo" onclick="if(event.target===this) cerrarModal()">
  <div class="modal" id="modal-contenido"></div>
</div>

<div class="banda-exito" id="banda-exito"><span data-icon="check"></span><span id="banda-texto"></span></div>


<script src="env.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="helpers.js"></script>
<script src="config.js"></script>
<script>
/* ============================================================
   Iconos (Lucide, trazo 2px)
   ============================================================ */
const ICONOS = {
  home: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
  calendario: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>',
  users: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  euro: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10h12"/><path d="M4 14h9"/><path d="M19 6a7.7 7.7 0 0 0-5.2-2A7.9 7.9 0 0 0 6 12c0 4.4 3.5 8 7.8 8 2 0 3.8-.8 5.2-2"/></svg>',
  settings: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>',
  search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>',
  check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  atras: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>',
  lapiz: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>',
  papelera: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  descargar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>',
  mensaje: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>',
  enlace: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
  globo: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>'
};
function pintarIconos(raiz = document) {
  raiz.querySelectorAll('[data-icon]').forEach(el => { el.innerHTML = ICONOS[el.dataset.icon] || ''; el.style.display = 'inline-flex'; });
}

/* ============================================================
   Estado de la interfaz
   ============================================================ */
let vista = 'inicio';
let clienteFichaId = null;
let factTab = 'mes';
let factFecha = hoyISO();
let mostrarTodosTerminar = false;
let agendaFecha = hoyISO();
let agendaModo = 'dia'; // dia | semana

/* La comprobación de sesión ahora es async: ver el bloque "Arranque" al final. */

function addDiasISO(fechaISO, n) {
  const d = new Date(fechaISO + 'T12:00:00');
  d.setDate(d.getDate() + n);
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().split('T')[0];
}

/* ============================================================
   Navegación
   ============================================================ */
function setVista(v, opts = {}) {
  vista = v;
  ['inicio', 'agenda', 'clientes', 'ficha', 'facturacion', 'ajustes'].forEach(x => {
    document.getElementById('vista-' + x).classList.toggle('oculto', x !== v);
  });
  const navActiva = v === 'ficha' ? 'clientes' : v;
  document.querySelectorAll('[data-nav]').forEach(b => b.classList.toggle('active', b.dataset.nav === navActiva));
  render();
  if (!opts.mantenerScroll) window.scrollTo(0, 0);
}

function render() {
  if (vista === 'inicio') renderInicio();
  if (vista === 'agenda') renderAgenda();
  if (vista === 'clientes') renderClientes();
  if (vista === 'ficha') renderFicha();
  if (vista === 'facturacion') renderFacturacion();
  if (vista === 'ajustes') renderAjustes();
}

/* ============================================================
   Banda de confirmación y modal genérico
   ============================================================ */
let bandaTimer = null;
function banda(texto) {
  document.getElementById('banda-texto').textContent = texto;
  const el = document.getElementById('banda-exito');
  el.classList.add('visible');
  clearTimeout(bandaTimer);
  bandaTimer = setTimeout(() => el.classList.remove('visible'), 2500);
}

function abrirModal(html) {
  const cont = document.getElementById('modal-contenido');
  cont.innerHTML = '<div class="modal-asa"></div>' + html;
  pintarIconos(cont);
  document.getElementById('modal-fondo').classList.add('abierto');
}
function cerrarModal() {
  document.getElementById('modal-fondo').classList.remove('abierto');
}
function cabeceraModal(titulo, atrasFn) {
  return `
    <div class="modal-cabecera">
      ${atrasFn
        ? `<button class="modal-cancelar" onclick="${atrasFn}">‹ Atrás</button>`
        : `<button class="modal-cancelar" onclick="cerrarModal()">Cancelar</button>`}
      <span></span>
    </div>
    <div class="modal-titulo">${titulo}</div>`;
}

let confirmarAccion = null;
function pedirConfirmacion(titulo, texto, etiqueta, fn, peligro = true) {
  confirmarAccion = fn;
  abrirModal(`
    ${cabeceraModal(escapeHtml(titulo))}
    <p style="font-size:16px;color:var(--gris-texto);margin:8px 0 20px;">${escapeHtml(texto)}</p>
    <div class="fila-botones">
      <button class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>
      <button class="btn ${peligro ? 'btn-peligro-lleno' : 'btn-primario'}" onclick="ejecutarConfirmacion()">${escapeHtml(etiqueta)}</button>
    </div>`);
}
async function ejecutarConfirmacion() {
  const fn = confirmarAccion;
  confirmarAccion = null;
  cerrarModal();
  if (fn) await fn();
}

/* ============================================================
   INICIO
   ============================================================ */
function renderInicio() {
  const hoy = hoyISO();
  const fechaTxt = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });

  const recientes = getClientes()
    .map(c => ({ c, ult: ultimaActividad(c.id) }))
    .sort((a, b) => a.ult < b.ult ? 1 : -1)
    .slice(0, 6);

  /* Llegan en la próxima hora */
  const ahoraMin = new Date().getHours() * 60 + new Date().getMinutes();
  const llegan = citasDeFecha(hoy).filter(c => {
    if (c.estado !== 'activa') return false;
    const ini = aMinutos(c.hora);
    return ini >= ahoraMin && ini <= ahoraMin + 60;
  });

  /* Citas de hoy (todas las activas, pendientes primero) */
  const citasHoy = citasDeFecha(hoy).filter(c => c.estado === 'activa');

  /* Bonos por terminar */
  const porTerminar = [];
  getClientes().forEach(c => {
    getBonosDeCliente(c.id).forEach(b => {
      if (estadoBono(b) !== 'activo') return;
      const rest = sesionesRestantes(b);
      if (rest >= 1 && rest <= 2) porTerminar.push({ cliente: c, bono: b, rest });
    });
  });
  porTerminar.sort((a, b) => a.rest - b.rest);
  const visiblesTerminar = mostrarTodosTerminar ? porTerminar : porTerminar.slice(0, 3);

  const movsHoy = movimientosEnRango(hoy, hoy);
  const sesionesHoy = sesionesEnFecha(hoy);
  const actividad = [...movsHoy, ...sesionesHoy];
  const totalHoy = movsHoy.reduce((s, m) => s + m.importe, 0);

  let html = `
    <div class="mb-16">
      <div class="titulo-pantalla">Hola, ${escapeHtml(getAjustesApp().negocio.nombre.split(" ")[0])}</div>
      <div class="texto-secundario" style="text-transform:capitalize;">${fechaTxt}</div>
    </div>

    <div class="buscador-wrap">
      <span data-icon="search"></span>
      <input type="text" class="buscador" id="buscador-inicio" placeholder="Busca un cliente para registrar sesión..."
             oninput="buscarEnInicio()" autocomplete="off">
      <div class="resultados-busqueda oculto" id="resultados-inicio"></div>
    </div>`;

  if (recientes.length) {
    html += `<div class="chips-recientes">` +
      recientes.map(r => `<button class="chip-cliente" onclick="abrirRapido('${r.c.id}')">${escapeHtml(r.c.nombre)}</button>`).join('') +
      `</div>`;
  }

  html += `<div class="mb-20" style="display:flex;gap:8px;flex-wrap:wrap;">
    <button class="btn btn-secundario btn-medio" onclick="abrirClienteForm()"><span data-icon="plus"></span>Nuevo cliente</button>
    <button class="btn btn-secundario btn-medio" onclick="copiarEnlaceReservas()"><span data-icon="enlace"></span>Copiar enlace de reservas</button>
  </div>`;

  if (llegan.length) {
    html += `
    <div class="bloque-llegan">
      <div class="titulo-bloque">Llegan en la próxima hora</div>
      ${llegan.map(c => {
        const cl = getCliente(c.cliente_id);
        return `
        <div class="fila-llega" onclick="abrirRapido('${c.cliente_id}')" style="cursor:pointer;">
          <div class="hora">${c.hora}</div>
          <div style="flex:1;">
            <div class="nombre">${escapeHtml(cl?.nombre || '')}</div>
            <div class="serv">${escapeHtml(c.servicio || 'Cita')}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  html += `
    <div class="tarjeta">
      <div style="display:flex;justify-content:space-between;align-items:center;" class="mb-8">
        <div class="titulo-bloque" style="margin-bottom:0;">Citas de hoy</div>
        <button class="btn btn-secundario btn-pequeno" onclick="setVista('agenda')">Ver agenda</button>
      </div>
      ${citasHoy.length ? citasHoy.map(c => filaCitaHTML(c)).join('')
        : `<div class="vacio" style="padding:16px 0;">No hay citas para hoy.</div>`}
    </div>`;

  if (porTerminar.length) {
    html += `
    <div class="bloque-terminar">
      <div class="titulo-bloque" style="color:#9a5f33;">Bonos por terminar</div>
      ${visiblesTerminar.map(x => `
        <div class="fila-terminar">
          <div style="flex:1;min-width:0;">
            <div class="nombre">${escapeHtml(x.cliente.nombre)}</div>
            <div class="detalle">${escapeHtml(x.bono.nombre)} · ${x.rest === 1 ? 'queda 1 sesión' : 'quedan 2 sesiones'}</div>
          </div>
          <button class="btn btn-secundario btn-pequeno" onclick="abrirFicha('${x.cliente.id}')">Abrir</button>
        </div>`).join('')}
      ${porTerminar.length > 3 && !mostrarTodosTerminar
        ? `<button class="link-texto" onclick="mostrarTodosTerminar=true;render();">Ver todos (${porTerminar.length})</button>` : ''}
    </div>`;
  }

  html += `
    <div class="tarjeta">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
        <div class="titulo-bloque" style="margin-bottom:0;">Actividad de hoy</div>
        <div class="fraunces" style="font-size:22px;font-weight:600;">${formatEuros(totalHoy)}</div>
      </div>
      ${actividad.length ? actividad.map(m => filaMovimientoHTML(m, false)).join('')
        : `<div class="vacio" style="padding:20px 0;">Hoy no hay cobros ni sesiones registrados.</div>`}
    </div>`;

  const cont = document.getElementById('vista-inicio');
  cont.innerHTML = html;
  pintarIconos(cont);
}

/* Fila de cita en listas (Inicio y ficha) */
function filaCitaHTML(c, conFecha = false) {
  const cl = getCliente(c.cliente_id);
  const fin = aHHMM(aMinutos(c.hora) + c.duracion_min);
  return `
    <div class="fila" onclick="abrirCitaDetalle('${c.id}')">
      <div style="width:56px;flex-shrink:0;">
        <div class="fraunces" style="font-size:18px;font-weight:600;">${c.hora}</div>
        ${conFecha ? `<div style="font-size:12px;color:var(--gris-texto);">${formatFechaCorta(c.fecha)}</div>` : `<div style="font-size:12px;color:var(--gris-texto);">${fin}</div>`}
      </div>
      <div style="flex:1;min-width:0;">
        <div class="fila-principal">${escapeHtml(cl?.nombre || 'Cliente eliminado')}</div>
        <div class="fila-secundaria">${escapeHtml(c.servicio || 'Cita')}${c.recordatorio_enviado ? ' · recordatorio enviado' : ''}</div>
      </div>
      <button class="btn btn-secundario btn-pequeno" onclick="event.stopPropagation();abrirRecordatorio('${c.id}')"><span data-icon="mensaje"></span></button>
    </div>`;
}

function buscarEnInicio() {
  const q = document.getElementById('buscador-inicio').value.trim().toLowerCase();
  const caja = document.getElementById('resultados-inicio');
  if (q.length < 1) { caja.classList.add('oculto'); return; }
  const res = getClientes().filter(c => c.nombre.toLowerCase().includes(q)).slice(0, 8);
  if (!res.length) {
    caja.innerHTML = `<div style="padding:14px 16px;font-size:15px;color:var(--gris-texto);">Sin resultados. <button class="link-texto" style="padding:0;" onclick="abrirClienteForm(null,document.getElementById('buscador-inicio').value.trim())">Crear cliente nuevo</button></div>`;
  } else {
    caja.innerHTML = res.map(c => {
      const e = textoEstadoCliente(c.id);
      return `<div class="fila" style="padding:10px 16px;" onclick="abrirRapido('${c.id}')">
        <div style="flex:1;">
          <div class="fila-principal">${escapeHtml(c.nombre)}</div>
          <div class="fila-secundaria" ${e.clase === 'warn' ? 'style="color:var(--terracota);font-weight:500;"' : ''}>${escapeHtml(e.texto)}</div>
        </div>
      </div>`;
    }).join('');
  }
  caja.classList.remove('oculto');
  pintarIconos(caja);
}

function filaMovimientoHTML(m, conCliente = true) {
  let importeHTML;
  if (m.kind === 'sesion') importeHTML = `<div class="fila-importe cero">0 €</div>`;
  else if (m.importe < 0) importeHTML = `<div class="fila-importe negativo">− ${formatEuros(Math.abs(m.importe))}</div>`;
  else importeHTML = `<div class="fila-importe">${formatEuros(m.importe)}</div>`;
  const linea2 = [formatFechaCorta(m.fecha), m.forma_pago || null, m.nota || null].filter(Boolean).join(' · ');
  return `
    <div class="fila" onclick="abrirEdicionRegistro('${m.kind}','${m.id}')">
      <div style="flex:1;min-width:0;">
        <div class="fila-principal">${conCliente ? escapeHtml(m.cliente) + ' — ' : ''}${escapeHtml(m.concepto)}</div>
        <div class="fila-secundaria">${escapeHtml(linea2)}</div>
      </div>
      ${importeHTML}
    </div>`;
}

/* ============================================================
   MODAL DE ACCIÓN RÁPIDA (descontar sesión)
   ============================================================ */
let rapidoOpciones = false;

function abrirRapido(clienteId) {
  rapidoOpciones = false;
  pintarRapido(clienteId);
}

function pintarRapido(clienteId) {
  const c = getCliente(clienteId);
  if (!c) return;
  const usables = bonosUsables(clienteId);

  let cuerpo = '';
  if (usables.length) {
    cuerpo += usables.map(b => {
      const rest = sesionesRestantes(b);
      const caducado = estadoBono(b) === 'caducado';
      return `
      <div class="tarjeta" style="margin-bottom:10px;">
        ${caducado ? `<div class="franja-aviso">Caducó el ${formatFecha(b.fecha_caducidad)}</div>` : ''}
        <div style="font-size:16px;font-weight:500;">${escapeHtml(b.nombre)}</div>
        <div class="texto-secundario mb-8">Quedan ${rest} de ${b.sesiones_totales} sesiones</div>
        ${caducado
          ? `<button class="btn btn-secundario btn-full" onclick="descontarConAviso('${b.id}')">Descontar igualmente</button>`
          : `<button class="btn btn-primario btn-full" onclick="descontar('${b.id}')">Descontar sesión</button>`}
      </div>`;
    }).join('');
    cuerpo += `
      <div class="fila-botones mt-8">
        <button class="btn btn-secundario btn-medio" onclick="abrirVender('${clienteId}')">Vender bono</button>
        <button class="btn btn-secundario btn-medio" onclick="abrirServicio('${clienteId}')">Cobrar servicio</button>
      </div>`;
  } else {
    cuerpo += `
      <p class="texto-secundario" style="font-size:16px;margin-bottom:16px;">Este cliente no tiene ningún bono activo.</p>
      <button class="btn btn-primario btn-full mb-12" onclick="abrirVender('${clienteId}')">Vender bono</button>
      <button class="btn btn-secundario btn-full" onclick="abrirServicio('${clienteId}')">Cobrar servicio suelto</button>`;
  }

  cuerpo += `
    <div class="centrado mt-8">
      <button class="link-texto" onclick="toggleRapidoOpciones('${clienteId}')">${rapidoOpciones ? 'Menos opciones' : 'Más opciones'}</button>
    </div>
    <div id="rapido-opciones" class="${rapidoOpciones ? '' : 'oculto'}">
      <div class="campo">
        <label class="etiqueta" for="rapido-fecha">Fecha de la sesión</label>
        <input type="date" class="input" id="rapido-fecha" value="${hoyISO()}">
      </div>
      <div class="campo">

  let html = `

        <button class="btn btn-secundario btn-pequeno" onclick="abrirBloqueoForm()">Bloquear horas</button>

      </div>
    </div>
    <div class="pildoras" style="max-width:280px;">
      <button class="pildora ${agendaModo === 'dia' ? 'activa' : ''}" onclick="agendaModo='dia';renderAgenda();">Día</button>
      <button class="pildora ${agendaModo === 'semana' ? 'activa' : ''}" onclick="agendaModo='semana';renderAgenda();">Semana</button>
    </div>
    <div class="agenda-cabecera">
      <button class="btn-flecha" onclick="moverAgenda(-1)" aria-label="Anterior">‹</button>

          ? d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' })
          : 'Semana del ' + new Date(lunesDe(agendaFecha) + 'T12:00:00').toLocaleDateString('es-ES', { day: 'numeric', month: 'long' })}</div>
        ${esHoy && agendaModo === 'dia' ? '' : `<button class="link-texto" style="padding:2px 6px;" onclick="agendaFecha=hoyISO();renderAgenda();">Ir a hoy</button>`}
      </div>
      <button class="btn-flecha" onclick="moverAgenda(1)" aria-label="Siguiente">›</button>
    </div>`;

  html += agendaModo === 'dia' ? htmlDia(agendaFecha) : htmlSemana();

  const cont = document.getElementById('vista-agenda');
  cont.innerHTML = html;
  pintarIconos(cont);
}

function moverAgenda(delta) {
  agendaFecha = addDiasISO(agendaFecha, delta * (agendaModo === 'semana' ? 7 : 1));
  renderAgenda();
}

function lunesDe(fechaISO) {
  const d = new Date(fechaISO + 'T12:00:00');
  return addDiasISO(fechaISO, -((d.getDay() + 6) % 7));
}

/* ---------- Vista de día: rejilla de medias horas ---------- */
function htmlDia(fecha) {
  const h = horarioDelDia(fecha);
  const citas = citasDeFecha(fecha);
  const bloqueos = bloqueosDeFecha(fecha);
  const bloqueoDia = bloqueos.find(b => b.dia_completo);

  if (bloqueoDia) {
    return `<div class="tarjeta" style="padding:12px;">
      <div class="dia-cerrado" onclick="abrirBloqueoDetalle('${bloqueoDia.id}')" style="cursor:pointer;">
        <div style="font-weight:600;font-size:18px;margin-bottom:4px;">Día bloqueado</div>
        ${escapeHtml(bloqueoDia.motivo || 'Sin motivo')} — toca para ver o eliminar el bloqueo
      </div>
      ${citas.filter(c => c.estado === 'activa').length ? `<p style="font-size:14px;color:var(--rojo);margin-top:12px;">Atención: hay citas creadas en este día bloqueado.</p>` : ''}
    </div>`;
  }

  if (!h.abierto && !citas.length && !bloqueos.length) {
    return `<div class="tarjeta" style="padding:12px;">
      <div class="dia-cerrado">
        <div style="font-weight:600;font-size:18px;margin-bottom:4px;">Cerrado</div>
        Los ${nombreDiaSemana(diaSemana(fecha)).toLowerCase()}s están cerrados según tu horario.
      </div>
    </div>`;
  }

  /* Rango del día: horario de apertura ampliado si hay algo fuera */
  let desde = h.abierto ? aMinutos(h.desde) : 9 * 60;
  let hasta = h.abierto ? aMinutos(h.hasta) : 19 * 60;
  citas.forEach(c => {
    desde = Math.min(desde, aMinutos(c.hora));
    hasta = Math.max(hasta, aMinutos(c.hora) + c.duracion_min);
  });
  bloqueos.forEach(b => {
    desde = Math.min(desde, aMinutos(b.hora_inicio));
    hasta = Math.max(hasta, aMinutos(b.hora_fin));
  });
  desde = Math.floor(desde / 30) * 30;
  hasta = Math.ceil(hasta / 30) * 30;

  const ocupado = new Set();
  citas.filter(c => c.estado === 'activa').forEach(c => {
    for (let m = aMinutos(c.hora); m < aMinutos(c.hora) + c.duracion_min; m += 30) ocupado.add(Math.floor(m / 30) * 30);
  });
  bloqueos.forEach(b => {
    for (let m = aMinutos(b.hora_inicio); m < aMinutos(b.hora_fin); m += 30) ocupado.add(Math.floor(m / 30) * 30);
  });

  let filas = '';
  for (let m = desde; m < hasta; m += 30) {
    const citasAqui = citas.filter(c => Math.floor(aMinutos(c.hora) / 30) * 30 === m);
    const bloqueosAqui = bloqueos.filter(b => Math.floor(aMinutos(b.hora_inicio) / 30) * 30 === m);
    let contenido = '';
    citasAqui.forEach(c => {
      const cl = getCliente(c.cliente_id);
      const fin = aHHMM(aMinutos(c.hora) + c.duracion_min);
      contenido += `
        <div class="cita-card ${c.estado === 'cancelada' ? 'cancelada' : ''}" onclick="abrirCitaDetalle('${c.id}')">
          <div class="c-nombre">${escapeHtml(cl?.nombre || 'Cliente eliminado')}</div>
          <div class="c-detalle">${c.hora}–${fin} · ${escapeHtml(c.servicio || 'Cita')}${c.estado === 'cancelada' ? ' · cancelada' : ''}</div>
          ${c.origen === 'online' ? '<span class="c-tag">Reserva online</span>' : ''}
          ${c.recordatorio_enviado && c.estado === 'activa' ? '<span class="c-tag">Recordatorio enviado</span>' : ''}
        </div>`;
    });
    bloqueosAqui.forEach(b => {
      contenido += `
        <div class="bloqueo-card" onclick="abrirBloqueoDetalle('${b.id}')">
          ${b.hora_inicio}–${b.hora_fin} · ${escapeHtml(b.motivo || 'Bloqueado')}
        </div>`;
    });
    if (!contenido) {
      contenido = ocupado.has(m)
        ? ''
        : `<div class="slot-libre" onclick="abrirCitaForm(null,{fecha:'${fecha}',hora:'${aHHMM(m)}'})">Libre — toca para crear cita</div>`;
    }
    filas += `
      <div class="slot">
        <div class="slot-hora">${aHHMM(m)}</div>
        <div class="slot-contenido">${contenido}</div>
      </div>`;
  }

  const notaCerrado = !h.abierto
    ? `<p style="font-size:14px;color:var(--gris-texto);margin-bottom:10px;">Este día está cerrado según tu horario, pero tiene citas o bloqueos.</p>` : '';

  return `<div class="tarjeta">${notaCerrado}${filas}</div>`;
}

/* ---------- Vista de semana ---------- */
function htmlSemana() {
  const lunes = lunesDe(agendaFecha);
  const hoy = hoyISO();
  let cols = '';
  for (let i = 0; i < 7; i++) {
    const f = addDiasISO(lunes, i);
    const d = new Date(f + 'T12:00:00');
    const h = horarioDelDia(f);
    const citas = citasDeFecha(f);
    const bloqueos = bloqueosDeFecha(f);
    const bloqueoDia = bloqueos.find(b => b.dia_completo);
    const cerrado = bloqueoDia || (!h.abierto && !citas.length && !bloqueos.length);

    let cuerpo = '';
    if (bloqueoDia) {
      cuerpo = `<div class="chip-bloqueo" onclick="abrirBloqueoDetalle('${bloqueoDia.id}')">${escapeHtml(bloqueoDia.motivo || 'Bloqueado')}</div>`;
    } else if (cerrado) {
      cuerpo = `<div style="font-size:12px;color:#b5b0a8;text-align:center;padding-top:20px;">Cerrado</div>`;
    }
    if (!bloqueoDia) {
      bloqueos.forEach(b => {
        cuerpo += `<div class="chip-bloqueo" onclick="abrirBloqueoDetalle('${b.id}')">${b.hora_inicio} ${escapeHtml(b.motivo || 'Bloqueado')}</div>`;
      });
      citas.forEach(c => {
        const cl = getCliente(c.cliente_id);
        cuerpo += `<div class="chip-cita ${c.estado === 'cancelada' ? 'cancelada' : ''}" onclick="abrirCitaDetalle('${c.id}')">
          <span class="h">${c.hora}</span> ${escapeHtml((cl?.nombre || '').split(' ')[0])}<br>${escapeHtml(c.servicio || 'Cita')}
        </div>`;
      });
      if (!citas.length && !bloqueos.length && h.abierto) {
        cuerpo += `<div style="font-size:12px;color:#b5b0a8;text-align:center;padding-top:20px;">Sin citas</div>`;
      }
    }

    cols += `
      <div class="semana-dia ${f === hoy ? 'hoy' : ''} ${cerrado ? 'cerrado' : ''}">
        <div class="sd-cab" onclick="agendaFecha='${f}';agendaModo='dia';renderAgenda();">
          ${d.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric' })}
        </div>
        ${cuerpo}
      </div>`;
  }
  return `<div class="semana-scroll"><div class="semana-grid">${cols}</div></div>
    <p class="texto-secundario centrado mt-8" style="font-size:13px;">Toca el nombre de un día para abrirlo en detalle.</p>`;
}

function buscarClienteCita() {
  const q = document.getElementById('cita-cliente-buscar').value.trim().toLowerCase();
  const caja = document.getElementById('cita-cliente-res');
  document.getElementById('cita-cliente-id').value = '';
  if (q.length < 1) { caja.classList.add('oculto'); return; }
  const res = getClientes().filter(c => c.nombre.toLowerCase().includes(q)).slice(0, 6);
  caja.innerHTML = res.length
    ? res.map(c => `<div class="fila" style="padding:8px 14px;min-height:48px;" onclick="elegirClienteCita('${c.id}')"><div class="fila-principal">${escapeHtml(c.nombre)}</div></div>`).join('')
    : `<div style="padding:12px 14px;font-size:14px;color:var(--gris-texto);">Sin resultados</div>`;
  caja.classList.remove('oculto');
}

function elegirClienteCita(id) {
  const c = getCliente(id);
  document.getElementById('cita-cliente-id').value = id;
  document.getElementById('cita-cliente-buscar').value = c.nombre;
  document.getElementById('cita-cliente-res').classList.add('oculto');
}

/* Aviso en vivo de solape mientras se rellena el formulario */
function avisoDisponibilidad() {
  const aviso = document.getElementById('cita-aviso');
  if (!aviso) return;
  const fecha = document.getElementById('cita-fecha').value;
  const hora = document.getElementById('cita-hora').value;
  const dur = parseInt(document.getElementById('cita-duracion').value);
  if (!fecha || !hora) { aviso.classList.add('oculto'); return; }
  const conflicto = conflictoCita(fecha, hora, dur, citaEditId);
  if (conflicto) {
    aviso.textContent = conflicto.texto;
    aviso.classList.remove('oculto');
  } else {
    aviso.classList.add('oculto');
  }
}

async function guardarCita() {
  const clienteId = document.getElementById('cita-cliente-id').value;
  const fecha = document.getElementById('cita-fecha').value;
  const hora = document.getElementById('cita-hora').value;
  const dur = parseInt(document.getElementById('cita-duracion').value);
  const servicio = document.getElementById('cita-servicio').value;
  const nota = document.getElementById('cita-nota').value;

  if (!clienteId) { document.getElementById('cita-cliente-buscar').focus(); banda('Elige un cliente de la lista'); return; }
  if (!fecha || !hora) return;

  /* La agenda impide solapes: bloqueo duro */
  const conflicto = conflictoCita(fecha, hora, dur, citaEditId);
  if (conflicto) {
    const aviso = document.getElementById('cita-aviso');
    aviso.textContent = conflicto.texto;
    aviso.classList.remove('oculto');
    return;
  }

  const guardar = async () => {
    try {
      if (citaEditId) {
        await editarCita(citaEditId, { cliente_id: clienteId, fecha, hora, duracion_min: dur, servicio: servicio.trim(), nota: nota.trim() });
        banda('Cita guardada');
      } else {
        await crearCita({ clienteId, fecha, hora, duracionMin: dur, servicio, nota });
        banda('Cita creada');
      }
      cerrarModal();
      agendaFecha = fecha;
      render();
    } catch (e) {
      const aviso = document.getElementById('cita-aviso');
      if (aviso) { aviso.textContent = e.message; aviso.classList.remove('oculto'); }
      else banda(e.message);
    }
  };

  /* Fuera de horario: aviso blando, el dueño decide */
  const fuera = fueraDeHorario(fecha, hora, dur);
  if (fuera) {
    pedirConfirmacion('Fuera de horario', fuera + ' ¿Crear la cita igualmente?', 'Crear cita', guardar, false);
  } else {
    guardar();
  }
}

  const usables = bonosUsables(c.id);

  /* 1. Información */

    <div class="ficha-cabecera">
      <button class="btn-atras" onclick="setVista('clientes')" aria-label="Volver"><span data-icon="atras"></span></button>

  if (usables.length) {
    html += usables.map(b => {
      const rest = sesionesRestantes(b);
      const cons = contarSesiones(b.id);
      const caducado = estadoBono(b) === 'caducado';
      const pct = Math.round((cons / b.sesiones_totales) * 100);
      return `
      <div class="tarjeta">
        ${caducado ? `<div class="franja-aviso">Caducó el ${formatFecha(b.fecha_caducidad)}</div>` : ''}
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div style="font-size:16px;font-weight:500;">${escapeHtml(b.nombre)}</div>

        </div>
        <div class="fraunces" style="font-size:28px;font-weight:600;">Quedan ${rest} de ${b.sesiones_totales}</div>
        <div class="progreso"><div style="width:${pct}%"></div></div>
        ${!caducado && b.fecha_caducidad ? `<div class="texto-secundario mb-12">Caduca el ${formatFecha(b.fecha_caducidad)}</div>` : ''}
        ${caducado
          ? `<button class="btn btn-secundario btn-full" onclick="fichaDescontarCaducado('${b.id}')">Descontar igualmente</button>`
          : `<button class="btn btn-primario btn-full" onclick="fichaDescontar('${b.id}')">Descontar sesión</button>`}
      </div>`;
    }).join('');
  } else {
    html += `
    <div class="tarjeta centrado" style="padding:28px 20px;">
      <div style="font-size:16px;color:var(--gris-texto);margin-bottom:16px;">Sin bono activo</div>
      <button class="btn btn-primario btn-full" onclick="abrirVender('${c.id}')">Vender bono</button>
    </div>`;
  }

  /* 4. Vender bono · Cobrar servicio */
  html += `
    <div class="fila-botones mb-24">
      <button class="btn btn-secundario btn-medio" onclick="abrirVender('${c.id}')">Vender bono</button>
      <button class="btn btn-secundario btn-medio" onclick="abrirServicio('${c.id}')">Cobrar servicio</button>

  const proximas = proximasCitasCliente(c.id).slice(0, 5);

    <div class="tarjeta">

        <div class="titulo-bloque" style="margin-bottom:0;">Próximas citas</div>

        : `<div class="vacio" style="padding:14px 0;">Sin citas próximas.</div>`}
    </div>`;

  /* 6. Dietas — escritas por el profesional, con PDF opcional */
  /* Dietas y fotos: se incorporarán en la siguiente fase, junto al
     portal privado de clientas (no forman parte de esta migración a
     Supabase). Aviso breve en lugar de dejarlas en localStorage, que
     ya no puede usarse para datos de negocio. */
  html += `
    <div class="tarjeta" style="background:var(--fondo);border-style:dashed;">

function historialCliente(clienteId) {
  const db = CACHE;
  const movs = [];
  db.bonos.filter(b => b.cliente_id === clienteId).forEach(b => {
    const estado = estadoBono(b);
    const sufijo = estado === 'cancelado' ? ' · cancelado' : estado === 'agotado' ? ' · agotado' : '';
    movs.push({ kind: 'bono', id: b.id, fecha: b.fecha_compra, cliente: '', concepto: 'Venta · ' + b.nombre, importe: b.precio, forma_pago: (b.forma_pago || '') + sufijo });
  });
  db.sesiones.filter(s => s.cliente_id === clienteId).forEach(s => {
    const b = db.bonos.find(x => x.id === s.bono_id);
    movs.push({ kind: 'sesion', id: s.id, fecha: s.fecha, cliente: '', concepto: 'Sesión · ' + (b?.nombre || 'Bono'), importe: 0, nota: s.nota });
  });
  db.servicios.filter(s => s.cliente_id === clienteId).forEach(s => {
    movs.push({ kind: 'servicio', id: s.id, fecha: s.fecha, cliente: '', concepto: s.concepto, importe: s.precio, forma_pago: s.forma_pago });
  });
  db.devoluciones.filter(d => d.cliente_id === clienteId).forEach(d => {
    movs.push({ kind: 'devolucion', id: d.id, fecha: d.fecha, cliente: '', concepto: 'Devolución', importe: -d.importe, nota: d.nota });
  });
  movs.sort((a, b) => a.fecha < b.fecha ? 1 : a.fecha > b.fecha ? -1 : 0);
  return movs;
}

async function fichaDescontar(bonoId) {
  const b = getBono(bonoId);
  await registrarSesion({ bonoId, fecha: hoyISO(), nota: '' });
  const rest = sesionesRestantes(getBono(bonoId));
  const c = getCliente(b.cliente_id);
  if (rest === 0) {
    abrirModal(`
      ${cabeceraModal('')}
      <div class="centrado" style="padding:8px 0 4px;">
        <div class="fraunces" style="font-size:22px;font-weight:600;margin-bottom:8px;">El bono de ${escapeHtml(c.nombre)} se ha terminado</div>
        <p class="texto-secundario" style="font-size:16px;margin-bottom:20px;">Se ha descontado la última sesión de «${escapeHtml(b.nombre)}».</p>

/* ============================================================
   FACTURACIÓN
   ============================================================ */
function rangoActual() {
  const d = new Date(factFecha + 'T12:00:00');
  const iso = x => { x.setMinutes(x.getMinutes() - x.getTimezoneOffset()); return x.toISOString().split('T')[0]; };
  if (factTab === 'dia') {
    return { desde: factFecha, hasta: factFecha, etiqueta: factFecha === hoyISO() ? 'Hoy' : formatFecha(factFecha) };
  }
  if (factTab === 'mes') {
    const desde = iso(new Date(d.getFullYear(), d.getMonth(), 1, 12));
    const hasta = iso(new Date(d.getFullYear(), d.getMonth() + 1, 0, 12));
    return { desde, hasta, etiqueta: d.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' }) };
  }
  return { desde: d.getFullYear() + '-01-01', hasta: d.getFullYear() + '-12-31', etiqueta: 'Año ' + d.getFullYear() };
}

function setFactTab(tab) {
  factTab = tab;
  factFecha = hoyISO();
  renderFacturacion();
}

function moverPeriodo(delta) {
  const d = new Date(factFecha + 'T12:00:00');
  if (factTab === 'dia') d.setDate(d.getDate() + delta);
  if (factTab === 'mes') d.setMonth(d.getMonth() + delta);
  if (factTab === 'ano') d.setFullYear(d.getFullYear() + delta);
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  factFecha = d.toISOString().split('T')[0];
  renderFacturacion();
}

function renderFacturacion() {
  const r = rangoActual();
  const movs = movimientosEnRango(r.desde, r.hasta);
  const total = movs.reduce((s, m) => s + m.importe, 0);

  const html = `
    <div class="titulo-pantalla mb-16">Facturación</div>
    <div class="pildoras">
      <button class="pildora ${factTab === 'dia' ? 'activa' : ''}" onclick="setFactTab('dia')">Hoy</button>
      <button class="pildora ${factTab === 'mes' ? 'activa' : ''}" onclick="setFactTab('mes')">Este mes</button>
      <button class="pildora ${factTab === 'ano' ? 'activa' : ''}" onclick="setFactTab('ano')">Este año</button>
    </div>
    <div class="tarjeta centrado" style="padding:24px 20px;">
      <div class="nav-periodo">
        <button class="btn-flecha" onclick="moverPeriodo(-1)" aria-label="Periodo anterior">‹</button>
        <div style="min-width:170px;">
          <div class="texto-secundario" style="text-transform:capitalize;">${escapeHtml(r.etiqueta)}</div>
          <div class="cifra-grande">${formatEuros(total)}</div>
        </div>
        <button class="btn-flecha" onclick="moverPeriodo(1)" aria-label="Periodo siguiente">›</button>
      </div>
    </div>
    <div class="tarjeta">
      <div class="titulo-bloque">Movimientos</div>
      ${movs.length ? movs.map(m => filaMovimientoHTML(m, true)).join('')
        : `<div class="vacio" style="padding:20px 0;">No hay cobros registrados en este periodo.</div>`}
    </div>`;

  const cont = document.getElementById('vista-facturacion');
  cont.innerHTML = html;
  pintarIconos(cont);
}

            <div class="fila-principal" ${sr.activo ? '' : 'style="color:var(--gris-texto);"'}>${escapeHtml(sr.nombre)}${sr.activo ? '' : ' · desactivado'}</div>
            <div class="fila-secundaria">${sr.duracion_min} minutos${sr.precio != null ? ' · ' + formatEuros(sr.precio) : ''}</div>
          </div>
          <span data-icon="lapiz" style="color:var(--gris-texto);width:20px;height:20px;"></span>
        </div>`).join('') : `<div class="vacio" style="padding:12px 0;">Crea tu primer servicio para activar las reservas online.</div>`}
      <div class="fila-ajuste" style="border-top:1px solid var(--gris-borde);margin-top:4px;">
        <div>
          <div class="fa-titulo">Duración por defecto</div>
          <div class="fa-sub">Se aplica al crear una cita nueva</div>
        </div>
        <select class="input" style="width:140px;" onchange="guardarDuracionDefecto(this.value)">
          ${[15, 30, 45, 60, 90, 120].map(m => `<option value="${m}" ${aj.duracionDefecto === m ? 'selected' : ''}>${m} min</option>`).join('')}
        </select>
      </div>
    </div>

    <!-- Enlace de reservas -->
    <div class="tarjeta">
      <div class="titulo-bloque">Tu enlace de reservas</div>
      <div class="enlace-gestion mb-12" id="aj-enlace-reservas"></div>
      <div class="fila-botones">
        <button class="btn btn-secundario btn-medio" onclick="copiarEnlaceReservas()"><span data-icon="enlace"></span>Copiar enlace</button>
        <a class="btn btn-secundario btn-medio" href="reservar.html" target="_blank" rel="noopener"><span data-icon="globo"></span>Abrir página</a>
      </div>
    </div>

    <!-- Recordatorios -->
    <div class="tarjeta">
      <div class="titulo-bloque">Recordatorios por WhatsApp</div>
      <div class="fila-ajuste">
        <div>
          <div class="fa-titulo">Preparar recordatorios 24h antes</div>
          <div class="fa-sub">Marca las citas de las próximas 24h para que los envíes con un toque. El envío automático real requiere conectar WhatsApp Business API (pendiente en la demo).</div>
        </div>
        <button class="interruptor ${aj.recordatorioAuto ? 'on' : ''}" onclick="toggleRecordatorioAuto(this)" aria-label="Recordatorios automáticos"></button>
      </div>
      <div class="campo mt-16">
        <label class="etiqueta" for="aj-msg">Mensaje del recordatorio</label>
        <textarea class="input" id="aj-msg" rows="4">${escapeHtml(aj.msgWhatsapp)}</textarea>
        <p class="texto-secundario mt-8" style="font-size:13px;">Puedes usar: {cliente} · {negocio} · {fecha} · {hora} · {servicio}</p>
      </div>
      <button class="btn btn-secundario btn-medio" onclick="guardarMensajeWhatsapp()">Guardar mensaje</button>
    </div>

    <!-- Datos del negocio -->
    <div class="tarjeta">
      <div class="titulo-bloque">Datos del negocio</div>
      <div class="campo">
        <label class="etiqueta" for="aj-negocio-nombre">Nombre</label>
        <input type="text" class="input" id="aj-negocio-nombre" value="${escapeHtml(aj.negocio.nombre)}">
      </div>
      <div class="campo">
        <label class="etiqueta" for="aj-negocio-tel">Teléfono</label>
        <input type="tel" class="input" id="aj-negocio-tel" value="${escapeHtml(aj.negocio.telefono)}">
      </div>
      <div class="campo">
        <label class="etiqueta" for="aj-negocio-dir">Dirección</label>
        <input type="text" class="input" id="aj-negocio-dir" value="${escapeHtml(aj.negocio.direccion || '')}">
      </div>
      <button class="btn btn-secundario btn-medio" onclick="guardarNegocio()">Guardar datos</button>
    </div>

    <button class="btn btn-secundario btn-full" onclick="doLogout()">Cerrar sesión</button>`;

  const cont = document.getElementById('vista-ajustes');
  cont.innerHTML = html;
  pintarIconos(cont);
  const enlaceEl = document.getElementById('aj-enlace-reservas');
  if (enlaceEl) enlaceEl.textContent = urlReservas();
}

async function guardarDuracionDefecto(valor) {
  await setAjustesApp({ duracionDefecto: parseInt(valor) });
  banda('Duración guardada');
}

async function guardarMensajeWhatsapp() {
  await setAjustesApp({ msgWhatsapp: document.getElementById('aj-msg').value });
  banda('Mensaje guardado');
}

async function toggleDiaHorario(d) {
  const aj = getAjustesApp();
  aj.horario[d].abierto = !aj.horario[d].abierto;
  await setAjustesApp({ horario: aj.horario });
  banda(aj.horario[d].abierto ? nombreDiaSemana(d) + ': abierto' : nombreDiaSemana(d) + ': cerrado');
  renderAjustes();
}

async function cambiarHorario(d, campo, valor) {
  if (!valor) return;
  const aj = getAjustesApp();
  aj.horario[d][campo] = valor;
  await setAjustesApp({ horario: aj.horario });
  banda('Horario guardado');
}

async function toggleRecordatorioAuto(btn) {
  const nuevo = !getAjustesApp().recordatorioAuto;
  await setAjustesApp({ recordatorioAuto: nuevo });
  btn.classList.toggle('on', nuevo);
  if (nuevo) {
    const n = await procesarRecordatoriosAuto();
    banda(n ? `Activado — ${n} recordatorio${n === 1 ? '' : 's'} preparado${n === 1 ? '' : 's'}` : 'Preparación de recordatorios activada');
    if (n) render();
  } else {
    banda('Preparación de recordatorios desactivada');
  }
}

function abrirDiaCerradoForm() {
  abrirModal(`
    ${cabeceraModal('Añadir día cerrado')}
    <div class="campo">
      <label class="etiqueta" for="dc-fecha">Fecha</label>
      <input type="date" class="input" id="dc-fecha" value="${hoyISO()}">
    </div>
    <div class="campo">
      <label class="etiqueta" for="dc-motivo">Motivo</label>
      <input type="text" class="input" id="dc-motivo" placeholder="Ej: vacaciones, festivo...">
    </div>
    <button class="btn btn-primario btn-full" onclick="guardarDiaCerrado()">Añadir día cerrado</button>`);
}

async function guardarDiaCerrado() {
  const fecha = document.getElementById('dc-fecha').value;
  if (!fecha) return;
  await crearBloqueo({ fecha, diaCompleto: true, motivo: document.getElementById('dc-motivo').value });
  cerrarModal();
  banda('Día cerrado añadido');
  render();
}

async function guardarNegocio() {
  await setAjustesApp({
    negocio: {
      nombre: document.getElementById('aj-negocio-nombre').value.trim() || 'Mi negocio',
      telefono: document.getElementById('aj-negocio-tel').value.trim(),
      direccion: document.getElementById('aj-negocio-dir').value.trim()
    }
  });
  banda('Datos del negocio guardados');
  (function pintarLogo() {
    const n = getAjustesApp().negocio.nombre.toUpperCase();
    const partes = n.split(' ');
    document.getElementById('logo-lateral').innerHTML =
      partes.length > 1 ? escapeHtml(partes[0]) + ' <span>' + escapeHtml(partes.slice(1).join(' ')) + '</span>' : escapeHtml(n);
  })();
}

/* ---------- Tipos de bono ---------- */
let tipoEditId = null;

function abrirTipoForm(id = null) {
  tipoEditId = id;
  const t = id ? getTipo(id) : null;
  abrirModal(`
    ${cabeceraModal(t ? 'Editar tipo de bono' : 'Nuevo tipo de bono')}
    <div class="campo">
      <label class="etiqueta" for="tipo-nombre">Nombre *</label>
      <input type="text" class="input" id="tipo-nombre" value="${escapeHtml(t?.nombre || '')}" placeholder="Ej: Bono 10 masajes">
    </div>
    <div class="campo">
      <label class="etiqueta" for="tipo-sesiones">Número de sesiones *</label>
      <input type="number" class="input" id="tipo-sesiones" value="${t?.sesiones || ''}" min="1" inputmode="numeric" placeholder="10">
    </div>
    <div class="campo">
      <label class="etiqueta" for="tipo-precio">Precio (€) *</label>
      <input type="number" class="input" id="tipo-precio" value="${t?.precio ?? ''}" min="0" step="0.5" inputmode="decimal" placeholder="250">
    </div>
    <div class="campo">
      <label class="etiqueta" for="tipo-caducidad">Caducidad en meses (vacío = no caduca)</label>
      <input type="number" class="input" id="tipo-caducidad" value="${t?.caducidadMeses ?? ''}" min="1" inputmode="numeric" placeholder="12">
    </div>
    <p class="texto-secundario mb-16" style="font-size:14px;">Los cambios no afectan a los bonos ya vendidos.</p>
    ${t ? `<button class="btn btn-secundario btn-full btn-medio mb-12" onclick="alternarArchivoTipo('${t.id}')">${t.archivado ? 'Recuperar tipo' : 'Archivar tipo (dejar de venderlo)'}</button>` : ''}
    <button class="btn btn-primario btn-full" onclick="guardarTipo()">${t ? 'Guardar cambios' : 'Crear tipo'}</button>`);
}

async function guardarTipo() {
  const nombre = document.getElementById('tipo-nombre').value.trim();
  const sesiones = parseInt(document.getElementById('tipo-sesiones').value);
  const precio = parseFloat(document.getElementById('tipo-precio').value);
  const cad = parseInt(document.getElementById('tipo-caducidad').value);
  if (!nombre) { document.getElementById('tipo-nombre').focus(); return; }
  if (!(sesiones > 0)) { document.getElementById('tipo-sesiones').focus(); return; }
  if (!(precio >= 0) || isNaN(precio)) { document.getElementById('tipo-precio').focus(); return; }
  const datos = { nombre, sesiones, precio, caducidadMeses: cad > 0 ? cad : null };
  if (tipoEditId) { await editarTipo(tipoEditId, datos); banda('Tipo de bono guardado'); }
  else { await crearTipo(datos); banda('Tipo de bono creado'); }
  cerrarModal();
  render();
}

async function alternarArchivoTipo(id) {
  const t = getTipo(id);
  await editarTipo(id, { archivado: !t.archivado });
  cerrarModal();
  banda(t.archivado ? 'Tipo recuperado' : 'Tipo archivado');
  render();
}

async function doLogout() {
  await logout();
  window.location.replace('index.html');
}

/* ---------- Enlace público de reservas ---------- */
function urlReservas() {
  return location.origin + location.pathname.replace('app.html', '') + 'reservar.html';
}

function copiarEnlaceReservas() {
  const url = urlReservas();
  const listo = () => banda('Enlace copiado');
  if (navigator.clipboard?.writeText) navigator.clipboard.writeText(url).then(listo, listo);
  else listo();
}

/* ---------- Servicios reservables ---------- */
let servicioResEditId = null;

function abrirServicioResForm(id = null) {
  servicioResEditId = id;
  const sr = id ? getServicioReservable(id) : null;
  abrirModal(`
    ${cabeceraModal(sr ? 'Editar servicio' : 'Nuevo servicio')}
    <div class="campo">
      <label class="etiqueta" for="sr-nombre">Nombre *</label>
      <input type="text" class="input" id="sr-nombre" value="${escapeHtml(sr?.nombre || '')}" placeholder="Ej: Masaje relajante">
    </div>
    <div class="campo">
      <label class="etiqueta" for="sr-duracion">Duración *</label>
      <select class="input" id="sr-duracion">
        ${[15, 30, 45, 60, 90, 120].map(m => `<option value="${m}" ${(sr?.duracion_min || 60) === m ? 'selected' : ''}>${m} minutos</option>`).join('')}
      </select>
    </div>
    <div class="campo">
      <label class="etiqueta" for="sr-precio">Precio (€) — opcional</label>
      <input type="number" class="input" id="sr-precio" value="${sr?.precio ?? ''}" min="0" step="0.5" inputmode="decimal" placeholder="Se muestra en la página de reservas">
    </div>
    <div class="fila-ajuste" style="margin-bottom:16px;">
      <div class="fa-titulo">Disponible para reservas online</div>
      <button class="interruptor ${sr === null || sr.activo ? 'on' : ''}" id="sr-activo" onclick="this.classList.toggle('on')"></button>
    </div>
    ${sr ? `<button class="btn btn-peligro btn-full btn-medio mb-12" onclick="pedirEliminarServicioRes('${sr.id}')"><span data-icon="papelera"></span>Eliminar servicio</button>` : ''}
    <button class="btn btn-primario btn-full" onclick="guardarServicioRes()">${sr ? 'Guardar cambios' : 'Crear servicio'}</button>`);
}

async function guardarServicioRes() {
  const nombre = document.getElementById('sr-nombre').value.trim();
  if (!nombre) { document.getElementById('sr-nombre').focus(); return; }
  const datos = {
    nombre,
    duracion_min: parseInt(document.getElementById('sr-duracion').value),
    precio: document.getElementById('sr-precio').value === '' ? null : parseFloat(document.getElementById('sr-precio').value),
    activo: document.getElementById('sr-activo').classList.contains('on')
  };
  if (servicioResEditId) { await editarServicioReservable(servicioResEditId, datos); banda('Servicio guardado'); }
  else { await crearServicioReservable({ nombre: datos.nombre, duracionMin: datos.duracion_min, precio: datos.precio, activo: datos.activo }); banda('Servicio creado'); }
  cerrarModal();
  render();
}

async function pedirEliminarServicioRes(id) {
  const sr = getServicioReservable(id);
  pedirConfirmacion(
    'Eliminar servicio',
    `«${sr.nombre}» dejará de poder reservarse online. Las citas ya creadas no cambian.`,
    'Eliminar',
    async () => {
      await eliminarServicioReservable(id);
      banda('Servicio eliminado');
      render();
    }
  );
}

/* ============================================================
   Arranque (async: sesión real de Supabase Auth + carga de datos)
   ============================================================ */
(async () => {
  const session = await getUserSession();
  if (!session) { window.location.replace('index.html'); return; }

  try {
    await cargarTodo();
  } catch (e) {
    document.body.innerHTML = `<div style="max-width:480px;margin:80px auto;padding:24px;text-align:center;font-family:sans-serif;">
      <h2>No se pudieron cargar los datos</h2>
      <p style="color:#888;">${escapeHtml(e.message)}</p>
      <p style="color:#888;font-size:14px;">Revisa env.js (SUPABASE_URL, SUPABASE_ANON_KEY, ORGANIZATION_ID) y que tu usuario esté vinculado a la organización — ver SETUP.md.</p>
      <button onclick="location.reload()" style="margin-top:12px;padding:10px 20px;">Reintentar</button>
    </div>`;
    console.error(e);
    return;
  }

  (function pintarLogo() {
    const n = getAjustesApp().negocio.nombre.toUpperCase();
    const partes = n.split(' ');
    document.getElementById('logo-lateral').innerHTML =
      partes.length > 1 ? escapeHtml(partes[0]) + ' <span>' + escapeHtml(partes.slice(1).join(' ')) + '</span>' : escapeHtml(n);
  })();
  pintarIconos();
  setVista('inicio');

  const _preparadosAuto = await procesarRecordatoriosAuto();
  if (_preparadosAuto) banda(`${_preparadosAuto} recordatorio${_preparadosAuto === 1 ? '' : 's'} preparado${_preparadosAuto === 1 ? '' : 's'} — ábrelos desde la agenda para enviarlos`);
})();
</script>

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
