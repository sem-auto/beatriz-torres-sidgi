<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="icon512.png">
<meta name="theme-color" content="#0a0a0a">
<title>Reserva tu cita</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="publico-main" id="app">
  <div class="publico-cabecera">
    <div class="publico-logo" id="pub-logo">SIDGI <span>BONOS</span></div>
    <div class="titulo-pantalla mt-8">Reserva tu cita</div>
    <div class="texto-secundario">En menos de un minuto, sin registrarte.</div>
  </div>

  <!-- Paso 1: servicio -->
  <div id="paso-servicio">
    <div class="paso-num">Paso 1 de 4</div>
    <div class="paso-titulo mb-12">¿Qué servicio quieres?</div>
    <div class="opciones-grandes" id="lista-servicios"></div>
  </div>

  <!-- Paso 2: día -->
  <div id="paso-dia" class="oculto">
    <div class="paso-num">Paso 2 de 4</div>
    <div class="paso-titulo mb-12">Elige el día</div>
    <div class="dias-scroll" id="lista-dias"></div>
    <button class="link-texto" id="btn-mas-dias" onclick="masDias()">Ver más días</button>
  </div>

  <!-- Paso 3: hora -->
  <div id="paso-hora" class="oculto">
    <div class="paso-num">Paso 3 de 4</div>
    <div class="paso-titulo mb-12">Elige la hora</div>
    <div id="lista-horas"></div>
  </div>

  <!-- Paso 4: datos -->
  <div id="paso-datos" class="oculto">
    <div class="paso-num">Paso 4 de 4</div>
    <div class="paso-titulo mb-12">Tus datos</div>
    <div class="tarjeta" id="resumen-reserva" style="padding:12px 20px;"></div>
    <div class="campo">
      <label class="etiqueta" for="res-nombre">Nombre *</label>
      <input type="text" class="input" id="res-nombre" placeholder="Nombre y apellidos" autocomplete="name">
    </div>
    <div class="campo">
      <label class="etiqueta" for="res-telefono">Teléfono *</label>
      <input type="tel" class="input" id="res-telefono" placeholder="600 000 000" autocomplete="tel">
    </div>
    <div class="campo">
      <label class="etiqueta" for="res-nota">Nota (opcional)</label>
      <input type="text" class="input" id="res-nota" placeholder="Algo que debamos saber">
    </div>
    <div id="res-error" class="oculto franja-aviso" style="background:var(--rojo-suave);color:var(--rojo);margin-bottom:12px;"></div>
    <button class="btn btn-primario btn-full" id="btn-confirmar" onclick="confirmarReserva()">Confirmar cita</button>
  </div>

  <!-- Confirmación -->
  <div id="paso-ok" class="oculto centrado">
    <div class="confirmacion-icono"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div class="paso-titulo">Tu cita está confirmada</div>
    <div class="tarjeta mt-16" style="text-align:left;padding:12px 20px;" id="ok-resumen"></div>
    <a class="btn btn-primario btn-full mb-12" id="btn-ics" download="cita.ics">Añadir al calendario</a>
    <a class="btn btn-secundario btn-full mb-16" id="btn-wa" target="_blank" rel="noopener">Contactar por WhatsApp</a>
    <p class="texto-secundario mb-8" style="font-size:14px;">Guarda este enlace para consultar o cancelar tu cita:</p>
    <div class="enlace-gestion mb-8" id="ok-enlace"></div>
    <button class="btn btn-secundario btn-medio" onclick="copiarEnlaceGestion()">Copiar enlace</button>
  </div>

  <div id="volver-wrap" class="centrado oculto" style="margin-top:16px;">
    <button class="link-texto" onclick="volverPaso()">‹ Volver al paso anterior</button>
  </div>
</div>

<script src="env.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="helpers.js"></script>
<script src="public-client.js"></script>
<script>
/* Página pública: sin sesión, sin navegación administrativa.
   Toda la disponibilidad y la reserva pasan por public-client.js (RPCs). */
let sel = { servicioId: null, servicio: null, fecha: null, hora: null };
let diasVisibles = 14;
let enlaceGestion = '';
let negocio = null;
let serviciosCache = [];
let diasDisponiblesCache = {}; // fechaISO -> boolean (memoizado tras consultar horas)

function mostrarPaso(paso) {
  ['servicio', 'dia', 'hora', 'datos', 'ok'].forEach(p =>
    document.getElementById('paso-' + p).classList.toggle('oculto', p !== paso));
  document.getElementById('volver-wrap').classList.toggle('oculto', paso === 'servicio' || paso === 'ok');
  window.scrollTo(0, 0);
}

function volverPaso() {
  if (!document.getElementById('paso-datos').classList.contains('oculto')) return pintarHoras();
  if (!document.getElementById('paso-hora').classList.contains('oculto')) return pintarDias();
  if (!document.getElementById('paso-dia').classList.contains('oculto')) return pintarServicios();
}

/* ---------- Paso 1: servicio ---------- */
async function pintarServicios() {
  const el = document.getElementById('lista-servicios');
  el.innerHTML = '<div class="vacio">Cargando servicios...</div>';
  mostrarPaso('servicio');
  try {
    serviciosCache = await obtenerServiciosPublico();
  } catch (e) {
    el.innerHTML = '<div class="vacio">No hemos podido cargar los servicios. Recarga la página, por favor.</div>';
    return;
  }
  el.innerHTML = serviciosCache.length
    ? serviciosCache.map(s => `
      <button class="opcion-grande" onclick="elegirServicio('${s.id}')">
        <span>${escapeHtml(s.nombre)}
          <span class="sub">${s.duracion_min} minutos</span>
        </span>
        ${s.precio != null ? `<span class="fraunces" style="font-size:18px;">${formatEuros(s.precio)}</span>` : ''}
      </button>`).join('')
    : '<div class="vacio">Ahora mismo no hay servicios disponibles para reservar online.<br>Llámanos y te atendemos.</div>';
}

function elegirServicio(id) {
  sel.servicioId = id;
  sel.servicio = serviciosCache.find(s => s.id === id);
  diasVisibles = 14;
  diasDisponiblesCache = {};
  pintarDias();
}

/* ---------- Paso 2: día ---------- */
async function pintarDias() {
  const el = document.getElementById('lista-dias');
  mostrarPaso('dia');
  const hoy = hoyISO();
  const fechas = [];
  for (let i = 0; i < diasVisibles; i++) fechas.push(addDiasISO(hoy, i));

  el.innerHTML = fechas.map(f => {
    const d = new Date(f + 'T12:00:00');
    return `
      <button class="dia-chip ${sel.fecha === f ? 'seleccionado' : ''}" id="dia-${f}" disabled onclick="elegirDia('${f}')">
        <span class="dc-sem">${d.toLocaleDateString('es-ES', { weekday: 'short' })}</span>
        <span class="dc-num">${d.getDate()}</span>
        <span class="dc-mes">${d.toLocaleDateString('es-ES', { month: 'short' })}</span>
      </button>`;
  }).join('');
  document.getElementById('btn-mas-dias').style.display = diasVisibles < 56 ? '' : 'none';

  // Consulta la disponibilidad real (servidor) para cada día visible y habilita el chip si tiene huecos
  await Promise.all(fechas.map(async f => {
    if (!(f in diasDisponiblesCache)) {
      try { diasDisponiblesCache[f] = (await obtenerHorasDisponibles(sel.servicioId, f)).length > 0; }
      catch (e) { diasDisponiblesCache[f] = false; }
    }
    const btn = document.getElementById('dia-' + f);
    if (btn) btn.disabled = !diasDisponiblesCache[f];
  }));
}

function masDias() {
  diasVisibles = Math.min(diasVisibles + 14, 56);
  pintarDias();
}

function elegirDia(f) {
  sel.fecha = f;
  pintarHoras();
}

/* ---------- Paso 3: hora ---------- */
async function pintarHoras() {
  const d = new Date(sel.fecha + 'T12:00:00');
  const el = document.getElementById('lista-horas');
  el.innerHTML = '<div class="vacio">Consultando horas libres...</div>';
  mostrarPaso('hora');

  let horas = [];
  try { horas = await obtenerHorasDisponibles(sel.servicioId, sel.fecha); }
  catch (e) { el.innerHTML = '<div class="vacio">No hemos podido consultar la disponibilidad. Inténtalo de nuevo.</div>'; return; }

  el.innerHTML = `
    <p class="texto-secundario mb-12" style="text-transform:capitalize;">${d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' })} · ${escapeHtml(sel.servicio.nombre)}</p>
    ${horas.length
      ? `<div class="horas-grid">` + horas.map(h => `<button class="hora-btn" onclick="elegirHora('${h}')">${h}</button>`).join('') + `</div>`
      : `<div class="vacio">No quedan horas libres este día.<br><button class="btn btn-secundario btn-medio mt-16" onclick="pintarDias()">Elegir otro día</button></div>`}`;
}

function elegirHora(h) {
  sel.hora = h;
  const d = new Date(sel.fecha + 'T12:00:00');
  document.getElementById('resumen-reserva').innerHTML = `
    <div class="resumen-linea"><span class="rl-label">Servicio</span><span class="rl-valor">${escapeHtml(sel.servicio.nombre)}</span></div>
    <div class="resumen-linea"><span class="rl-label">Día</span><span class="rl-valor" style="text-transform:capitalize;">${d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' })}</span></div>
    <div class="resumen-linea"><span class="rl-label">Hora</span><span class="rl-valor">${sel.hora} (${sel.servicio.duracion_min} min)</span></div>`;
  document.getElementById('res-error').classList.add('oculto');
  mostrarPaso('datos');
}

/* ---------- Paso 4: confirmar ----------
   La validación real (horario, bloqueos, días cerrados, solapes) y el
   INSERT ocurren en el servidor dentro de book_appointment_public — no
   es "comprobar en el navegador y luego insertar". */
async function confirmarReserva() {
  const nombre = document.getElementById('res-nombre').value.trim();
  const telefono = document.getElementById('res-telefono').value.trim();
  const nota = document.getElementById('res-nota').value.trim();
  const errorEl = document.getElementById('res-error');

  if (!nombre) { document.getElementById('res-nombre').focus(); return; }
  if (normalizarTelefono(telefono).length < 9) {
    errorEl.textContent = 'Revisa el teléfono: necesitamos 9 dígitos para confirmar la cita.';
    errorEl.classList.remove('oculto');
    return;
  }

  const btn = document.getElementById('btn-confirmar');
  btn.disabled = true;
  const res = await reservarCitaPublica({ servicioId: sel.servicioId, fecha: sel.fecha, hora: sel.hora, nombre, telefono, nota });
  btn.disabled = false;

  if (res.error) {
    errorEl.textContent = res.error;
    errorEl.classList.remove('oculto');
    if (res.error.includes('ocuparse')) setTimeout(pintarHoras, 1600);
    return;
  }

  const cita = res.cita;
  const d = new Date(cita.fecha + 'T12:00:00');
  document.getElementById('ok-resumen').innerHTML = `
    <div class="resumen-linea"><span class="rl-label">Servicio</span><span class="rl-valor">${escapeHtml(cita.servicio)}</span></div>
    <div class="resumen-linea"><span class="rl-label">Día</span><span class="rl-valor" style="text-transform:capitalize;">${d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' })}</span></div>
    <div class="resumen-linea"><span class="rl-label">Hora</span><span class="rl-valor">${cita.hora} (${cita.duracion_min} min)</span></div>
    <div class="resumen-linea"><span class="rl-label">Dónde</span><span class="rl-valor">${escapeHtml(negocio.nombre)}<br><span style="font-weight:400;font-size:13px;color:var(--gris-texto);">${escapeHtml(negocio.direccion || '')}</span></span></div>`;

  document.getElementById('btn-ics').href = icsDeCita(cita, negocio.nombre);
  const telNegocio = (negocio.telefono || '').replace(/\D/g, '');
  const btnWA = document.getElementById('btn-wa');
  if (telNegocio) btnWA.href = 'https://wa.me/34' + telNegocio;
  else btnWA.style.display = 'none';

  enlaceGestion = location.origin + location.pathname.replace('reservar.html', '') + 'reserva.html?id=' + cita.token;
  document.getElementById('ok-enlace').textContent = enlaceGestion;
  mostrarPaso('ok');
}

function copiarEnlaceGestion() {
  const listo = () => { const b = document.createElement('div'); b.className = 'banda-exito visible'; b.textContent = 'Enlace copiado'; document.body.appendChild(b); setTimeout(() => b.remove(), 2000); };
  if (navigator.clipboard?.writeText) navigator.clipboard.writeText(enlaceGestion).then(listo, listo);
  else listo();
}

(async () => {
  try {
    negocio = await obtenerNegocioPublico();
    document.getElementById('pub-logo').innerHTML = escapeHtml(negocio.nombre).toUpperCase().replace(/^(\S+)\s*(.*)$/, (m, a, b) => b ? a + ' <span>' + b + '</span>' : a);
    document.title = 'Reserva tu cita — ' + negocio.nombre;
  } catch (e) {
    negocio = { nombre: 'Nuestro negocio', telefono: '', direccion: '' };
  }
  pintarServicios();
})();
</script>
</body>
</html>
