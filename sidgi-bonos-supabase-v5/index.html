<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon512.png">
<meta name="theme-color" content="#0a0a0a">
<title>Beatriz Torres — Acceder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">BEATRIZ <span>TORRES</span></div>
  <p class="texto-secundario centrado mb-24">Dietética · Estética general · Maderoterapia · i-Model<br>Turís (Valencia)</p>

  <!-- Entrar -->
  <div id="form-login">
    <div class="campo">
      <label class="etiqueta" for="login-email">Email</label>
      <input type="email" class="input" id="login-email" placeholder="tu@email.com" autocomplete="username">
    </div>
    <div class="campo">
      <label class="etiqueta" for="login-pass">Contraseña</label>
      <input type="password" class="input" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div id="login-error" class="oculto franja-aviso" style="background:var(--rojo-suave);color:var(--rojo);"></div>
    <button class="btn btn-primario btn-full mb-12" id="btn-login" onclick="doLogin()">Entrar</button>
    <p class="centrado"><button class="link-texto" onclick="mostrarRecuperar()">¿Olvidaste tu contraseña?</button></p>
  </div>

  <!-- Pedir enlace de recuperación -->
  <div id="form-recuperar" class="oculto">
    <p class="texto-secundario mb-16" style="font-size:15px;">Te enviaremos un enlace para restablecer tu contraseña.</p>
    <div class="campo">
      <label class="etiqueta" for="rec-email">Email</label>
      <input type="email" class="input" id="rec-email" placeholder="tu@email.com">
    </div>
    <div id="rec-msg" class="oculto franja-aviso"></div>
    <button class="btn btn-primario btn-full mb-12" onclick="doRecuperar()">Enviar enlace</button>
    <p class="centrado"><button class="link-texto" onclick="mostrarLogin()">‹ Volver a entrar</button></p>
  </div>

  <!-- Establecer nueva contraseña (llegando desde el enlace del correo) -->
  <div id="form-nueva-pass" class="oculto">
    <p class="texto-secundario mb-16" style="font-size:15px;">Elige tu nueva contraseña.</p>
    <div class="campo">
      <label class="etiqueta" for="nueva-pass">Nueva contraseña</label>
      <input type="password" class="input" id="nueva-pass" placeholder="Mínimo 6 caracteres">
    </div>
    <div id="nueva-pass-error" class="oculto franja-aviso" style="background:var(--rojo-suave);color:var(--rojo);"></div>
    <button class="btn btn-primario btn-full" onclick="doNuevaPassword()">Guardar contraseña</button>
  </div>
</div>

<script src="env.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="helpers.js"></script>
<script>
window.sb = window.supabase.createClient(window.SIDGI_ENV.SUPABASE_URL, window.SIDGI_ENV.SUPABASE_ANON_KEY);
const sb = window.sb;

function mostrarLogin() {
  document.getElementById('form-login').classList.remove('oculto');
  document.getElementById('form-recuperar').classList.add('oculto');
  document.getElementById('form-nueva-pass').classList.add('oculto');
}
function mostrarRecuperar() {
  document.getElementById('form-login').classList.add('oculto');
  document.getElementById('form-recuperar').classList.remove('oculto');
  document.getElementById('rec-msg').classList.add('oculto');
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errorEl = document.getElementById('login-error');
  errorEl.classList.add('oculto');
  if (!email || !pass) { errorEl.textContent = 'Rellena email y contraseña.'; errorEl.classList.remove('oculto'); return; }
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Entrando...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.textContent = 'Entrar';
  if (error) {
    errorEl.textContent = error.message === 'Invalid login credentials' ? 'Email o contraseña incorrectos.' : error.message;
    errorEl.classList.remove('oculto');
    return;
  }
  window.location.href = 'app.html';
}
document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doRecuperar() {
  const email = document.getElementById('rec-email').value.trim();
  const msgEl = document.getElementById('rec-msg');
  if (!email) return;
  await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin + location.pathname });
  msgEl.style.background = 'var(--terracota-suave)'; msgEl.style.color = '#9a5f33';
  msgEl.textContent = 'Si ese email existe, te hemos enviado un enlace para restablecer la contraseña.';
  msgEl.classList.remove('oculto');
}

async function doNuevaPassword() {
  const pass = document.getElementById('nueva-pass').value;
  const errorEl = document.getElementById('nueva-pass-error');
  if (pass.length < 6) { errorEl.textContent = 'La contraseña debe tener al menos 6 caracteres.'; errorEl.classList.remove('oculto'); return; }
  const { error } = await sb.auth.updateUser({ password: pass });
  if (error) { errorEl.textContent = error.message; errorEl.classList.remove('oculto'); return; }
  window.location.href = 'app.html';
}

/* Si Supabase nos redirige aquí tras pulsar el enlace de recuperación,
   dispara el evento PASSWORD_RECOVERY: mostramos el formulario de nueva contraseña. */
sb.auth.onAuthStateChange((event) => {
  if (event === 'PASSWORD_RECOVERY') {
    document.getElementById('form-login').classList.add('oculto');
    document.getElementById('form-recuperar').classList.add('oculto');
    document.getElementById('form-nueva-pass').classList.remove('oculto');
  }
});

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session && !location.hash.includes('type=recovery')) window.location.replace('app.html');
})();
</script>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
